<!DOCTYPE html>

<head>

    <style>
        :root {
            --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --accent: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --dark: #1a1a2e;
            --dark-alt: #16213e;
            --light: #f8fafc;
            --glass: rgba(255,255,255,0.1);
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            --shadow-hover: 0 35px 60px -12px rgba(0,0,0,0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--light); 
            color: var(--dark); 
            overflow-x: hidden;
            line-height: 1.7;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }

        header {

        .cta-header { 
            background: var(--primary); color: white; padding: 14px 32px; 
            border-radius: 50px; text-decoration: none; font-weight: 600;
            font-size: 0.95rem; letter-spacing: 0.5px; transition: all 0.3s;
            box-shadow: var(--shadow);

        .cta-header:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }

        /* HERO - PARALLAX + GLASS */
        .hero { 
            min-height: 100vh; display: flex; align-items: center; 
            background: linear-gradient(135deg, var(--dark) 0%, var(--dark-alt) 100%);
            position: relative; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><radialGradient id="a" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="%23ffffff" stop-opacity="0.1"/><stop offset="100%" stop-color="%23ffffff" stop-opacity="0"/></radialGradient></defs><circle cx="30" cy="30" r="8" fill="url(%23a)"><animate attributeName="r" values="8;12;8" dur="3s" repeatCount="indefinite"/></circle><circle cx="70" cy="70" r="6" fill="url(%23a)"><animate attributeName="r" values="6;10;6" dur="4s" repeatCount="indefinite"/></circle></svg>') no-repeat center/cover;
            animation: float 20s infinite linear;
        }
        .hero-content { position: relative; z-index: 2; max-width: 800px; text-align: center; color: white; }
        .hero-badge { 
            display: inline-block; background: rgba(255,255,255,0.2); 
            backdrop-filter: blur(10px); padding: 8px 24px; border-radius: 50px;
            font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.3);

        .hero h1 { 
            font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 900; 
            line-height: 1.1; margin-bottom: 1.5rem; letter-spacing: -0.02em;
        }
        .hero-subtitle { 
            font-size: 1.4rem; margin-bottom: 3rem; opacity: 0.95;
            max-width: 600px; margin-left: auto; margin-right: auto;
        }
        .hero-video { 
            width: 100%; max-width: 700px; height: 400px; margin: 2rem auto;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; cursor: pointer; transition: all 0.3s;
            box-shadow: var(--shadow);

        .hero-video:hover { transform: scale(1.02); box-shadow: var(--shadow-hover); }
        .cta-stack { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .cta-primary {

            box-shadow: var(--shadow); transition: all 0.3s;
        }
        .cta-primary:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
        .cta-secondary { 
            background: rgba(255,255,255,0.2); color: white; padding: 20px 32px;
            border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 1.1rem;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s;
        }
        .cta-secondary:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }

        .section { padding: 120px 0; }

        .pain-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 2rem; }
        .pain-card { 
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            padding: 3rem 2.5rem; border-radius: 24px; text-align: center;
            border: 1px solid rgba(255,255,255,0.2); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--shadow);
        }
        .pain-card:hover { 
            transform: translateY(-15px) rotateX(5deg) rotateY(5deg); 
            box-shadow: var(--shadow-hover);
        }
        .pain-icon { 
            width: 100px; height: 100px; margin: 0 auto 1.5rem; 
            background: var(--secondary); border-radius: 20px; display: flex;

            font-size: 3.5rem; font-weight: 900; background: var(--secondary);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 1rem; letter-spacing: -0.03em;
        }

        /* STATS - FLOATING */
        .stats-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 2rem; text-align: center; margin: 4rem 0;
        }
        .stat-item { position: relative; }
        .stat-number { 
            font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; 
            background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .stat-label { font-size: 1.1rem; color: #64748b; font-weight: 500; }

        .testimonials { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));

        .testimonial::before {
            content: '"'; font-size: 6rem; color: #e2e8f0; position: absolute; top: 20px; left: 30px;

        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        .price-card { 
            background: rgba(255,255,255,0.95); backdrop-filter: blur(25px);

            border: 1px solid rgba(255,255,255,0.3); transition: all 0.4s;
            box-shadow: var(--shadow); position: relative; overflow: hidden;
        }
        .price-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;

            transition: left 0.6s;

        .price-card.featured { 
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(248,250,252,0.8));

        }
        .featured-badge { 
            position: absolute; top: 20px; right: 20px; background: var(--secondary);
            color: white; padding: 8px 16px; border-radius: 20px; font-size: 0.8rem;
            font-weight: 700; letter-spacing: 1px;
        }
        .price-amount { 
            font-size: 4rem; font-weight: 900; background: var(--primary);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;

        .price-features { list-style: none; margin: 2.5rem 0; }

            padding: 1rem 0; font-size: 1.1rem; display: flex; align-items: center;

        .price-cta { 
            background: var(--primary); color: white; border: none;
            padding: 22px 40px; border-radius: 50px; font-size: 1.2rem;
            font-weight: 700; cursor: pointer; width: 100%; margin-top: 2rem;
            transition: all 0.3s; box-shadow: var(--shadow);
        }
        .price-cta:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }

        /* FINAL CTA */
        .final-cta { 
            background: var(--primary); color: white; padding: 140px 0; text-align: center;
            position: relative; overflow: hidden;
        }
        .final-cta::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;

        @media (max-width: 768px) {
            .cta-stack { flex-direction: column; align-items: center; }

            .stats-grid { grid-template-columns: repeat(2, 1fr); }

        /* ANIMATIONS */
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: slideIn 0.8s ease-out forwards; }
