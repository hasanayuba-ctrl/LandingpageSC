<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoalGuru AI - Generator Soal Otomatis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #1e293b;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
            z-index: 1000;
            padding: 15px 0;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #2563eb;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-header {
            background: #2563eb;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .btn-header:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37,99,235,0.3);
        }
        
        /* Hero */
        .hero {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: white;
            padding: 140px 0 100px;
            text-align: center;
            margin-top: 60px;
        }
        
        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        
        .hero h1 span {
            color: #60a5fa;
        }
        
        .hero-subtitle {
            font-size: 1.25rem;
            color: #cbd5e1;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .hero-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }
        
        .btn-primary {
            background: #2563eb;
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(37,99,235,0.4);
        }
        
        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(37,99,235,0.5);
        }
        
        .btn-secondary {
            background: transparent;
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid rgba(255,255,255,0.3);
            display: inline-block;
            transition: all 0.3s;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.5);
        }
        
        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .hero-stat h3 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #60a5fa;
        }
        
        .hero-stat p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        /* Pain Section */
        .pain {
            padding: 100px 0;
            background: #f8fafc;
        }
        
        .section-header {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 60px;
        }
        
        .tag {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(239,68,68,0.1);
            color: #ef4444;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 15px;
        }
        
        .section-subtitle {
            color: #64748b;
            font-size: 1.1rem;
        }
        
        .pain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        
        .pain-card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 4px solid #ef4444;
            transition: transform 0.3s;
        }
        
        .pain-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .pain-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .pain-stat {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ef4444;
            margin-bottom: 10px;
        }
        
        .pain-card h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #0f172a;
        }
        
        .pain-card p {
            color: #64748b;
            font-size: 0.95rem;
        }
        
        /* Proof Section */
        .proof {
            padding: 100px 0;
            background: white;
        }
        
        .proof-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }
        
        .proof-box {
            background: #eff6ff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #dbeafe;
        }
        
        .proof-number {
            font-size: 3rem;
            font-weight: 800;
            color: #2563eb;
            margin-bottom: 5px;
        }
        
        .proof-label {
            color: #64748b;
            font-weight: 500;
        }
        
        .testimonials {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }
        
        .testimonial {
            background: #f8fafc;
            padding: 30px;
            border-radius: 16px;
            border-left: 4px solid #2563eb;
        }
        
        .testimonial p {
            font-style: italic;
            color: #475569;
            margin-bottom: 20px;
            line-height: 1.8;
        }
        
        .testimonial-author {
            font-weight: 700;
            color: #2563eb;
        }
        
        /* Solution */
        .solution {
            padding: 100px 0;
            background: #f8fafc;
        }
        
        .solution-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }
        
        .solution-content h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 30px;
        }
        
        .solution-content h2 span {
            color: #2563eb;
        }
        
        .step {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 30px;
            padding: 25px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .step-number {
            width: 50px;
            height: 50px;
            background: #2563eb;
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        
        .step h4 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #0f172a;
        }
        
        .step p {
            color: #64748b;
            font-size: 0.95rem;
        }
        
        .solution-visual {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .mockup-screen {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 30px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }
        
        /* Benefits */
        .benefits {
            padding: 100px 0;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            text-align: center;
        }
        
        .benefits h2 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 60px;
        }
        
        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
        }
        
        .benefit-item h3 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #93c5fd;
        }
        
        .benefit-item p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        /* Pricing */
        .pricing {
            padding: 100px 0;
            background: white;
        }
        
        .pricing-header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        
        .price-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
        }
        
        .price-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-color: #2563eb;
        }
        
        .price-card.featured {
            border-color: #2563eb;
            box-shadow: 0 20px 40px rgba(37,99,235,0.15);
            transform: scale(1.05);
        }
        
        .price-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #2563eb;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        
        .price-name {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #0f172a;
        }
        
        .price-amount {
            font-size: 3rem;
            font-weight: 800;
            color: #2563eb;
            margin-bottom: 5px;
        }
        
        .price-period {
            color: #64748b;
            margin-bottom: 30px;
        }
        
        .price-features {
            list-style: none;
            margin-bottom: 30px;
        }
        
        .price-features li {
            padding: 12px 0;
            color: #475569;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .price-features li:last-child {
            border-bottom: none;
        }
        
        .btn-price {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-price:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37,99,235,0.4);
        }
        
        .price-card.featured .btn-price {
            background: #0f172a;
        }
        
        /* CTA Final */
        .final-cta {
            padding: 100px 0;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        
        .final-cta h2 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
        }
        
        .final-cta p {
            font-size: 1.3rem;
            color: #94a3b8;
            margin-bottom: 40px;
        }
        
        .btn-large {
            background: #2563eb;
            color: white;
            padding: 20px 50px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .btn-large:hover {
            background: #1d4ed8;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(37,99,235,0.5);
        }
        
        /* Footer */
        footer {
            background: #0f172a;
            color: #64748b;
            text-align: center;
            padding: 40px 0;
            border-top: 1px solid #1e293b;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .solution-grid {
                grid-template-columns: 1fr;
            }
            
            .price-card.featured {
                transform: scale(1);
            }
            
            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn-primary, .btn-secondary {
                width: 100%;
                max-width: 300px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <span style="font-size: 1.8rem;">🎯</span>
                    SoalGuru AI
                </div>
                <a href="#pricing" class="btn-header">Mulai Gratis</a>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="container">
            <h1>Guru, Capek Bikin Soal <span>5-10 Jam?</span></h1>
            <p class="hero-subtitle">Upload materi → Generate otomatis → Download PDF/Word siap cetak dalam 30 detik!</p>
            
            <div class="hero-buttons">
                <a href="#pricing" class="btn-primary">
